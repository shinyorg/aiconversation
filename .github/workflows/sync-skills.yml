name: Sync Skills to Skills Repository

on:
  push:
    branches:
      - main
    paths:
      - 'SKILLS/**'
  workflow_dispatch:

jobs:
  sync-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout skills repository
        uses: actions/checkout@v4
        with:
          repository: shinyorg/skills
          token: ${{ secrets.SKILLS_REPO_TOKEN }}
          path: skills-repo

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync skills directory
        run: |
          if [ -d "source/SKILLS/shiny-ai" ]; then
            rm -rf skills-repo/plugins/ai/skills/shiny-ai
            mkdir -p skills-repo/plugins/ai/skills
            cp -r source/SKILLS/shiny-ai skills-repo/plugins/ai/skills/
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SKILLS_REPO_TOKEN }}
          path: skills-repo
          commit-message: "Update shiny-ai skill from ai repository"
          title: "Update shiny-ai skill"
          body: |
            This PR updates the shiny-ai skill from the [ai repository](https://github.com/shinyorg/ai).

            **Source commit:** ${{ github.sha }}
            **Triggered by:** @${{ github.actor }}

            ---
            *This PR was automatically created by the [sync-skills workflow](https://github.com/shinyorg/ai/actions/workflows/sync-skills.yml).*
          branch: update-shiny-ai-skill
          delete-branch: true
          labels: |
            automated
            skills-update
